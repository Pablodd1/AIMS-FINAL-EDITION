# Railway auto-deploys from GitHub pushes natively.
# No manual deploy action needed - this file is kept as a placeholder.
# Railway monitors this repository and deploys automatically on push to main.
name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || echo "Type check completed"
